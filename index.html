<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="像素星球 DotLab — TODO: 填写页面描述">
  <meta property="og:title" content="像素星球 DotLab">
  <meta property="og:description" content="TODO: 填写社交分享描述">
  <meta property="og:image" content="site-content/brand/og-image.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>像素星球 DotLab</title>
  <link rel="icon" href="site-content/brand/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="site-content/brand/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="#top" aria-label="像素星球 DotLab">
        <img class="brand__logo" src="site-content/brand/logo.png" alt="像素星球 Logo" width="40" height="40">
        <span class="brand__name">
          <span class="brand__title" data-i18n="app_name">像素星球</span>
          <span class="brand__sub" data-i18n="app_name_sub">DotLab</span>
        </span>
      </a>
      <nav class="lang-switch" aria-label="语言切换">
        <button type="button" class="lang-switch__btn is-active" data-lang="zh-CN">中文</button>
        <button type="button" class="lang-switch__btn" data-lang="en">EN</button>
        <button type="button" class="lang-switch__btn" data-lang="ja">日本語</button>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container hero__grid">
        <div class="hero__content">
          <img class="hero__logo" src="site-content/brand/logo.png" alt="像素星球 Logo" width="120" height="120">
          <h1 class="hero__title">
            <span data-i18n="app_name">像素星球</span>
            <span class="hero__subtitle" data-i18n="app_name_sub">DotLab</span>
          </h1>
          <p class="hero__tagline" data-i18n="tagline">TODO: 填写一句话 Slogan</p>
          <p class="hero__desc" data-i18n="description_short">TODO: 填写简短介绍</p>

          <div class="download" id="download">
            <h2 class="section-label" data-i18n="download_title">立即下载</h2>
            <div class="download__buttons" id="download-buttons"></div>
          </div>
        </div>

        <div class="hero__visual">
          <div class="phone-frame">
            <img id="hero-screenshot" src="site-content/screenshots/placeholder.svg" alt="应用截图">
          </div>
        </div>
      </div>
    </section>

    <section class="screenshots section" id="screenshots">
      <div class="container">
        <h2 class="section-title" data-i18n="screenshots_title">应用截图</h2>
        <div class="screenshots__track" id="screenshots-track"></div>
      </div>
    </section>

    <section class="social section" id="social">
      <div class="container social__inner">
        <h2 class="section-title" data-i18n="social_title">关注我们</h2>
        <div class="social__links" id="social-links"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">
        © <span data-i18n="copyright_year">2026</span>
        <span data-i18n="developer">DotLab</span>.
        <span data-i18n="app_name">像素星球</span>
      </p>
      <nav class="footer__nav" aria-label="页脚导航">
        <a class="footer__link" id="privacy-link" href="private.html" data-i18n="footer_privacy">隐私政策</a>
        <a class="footer__link" href="support.html" data-i18n="footer_support">支持与联系</a>
        <a class="footer__link" id="contact-link" href="mailto:dotlab.app@gmail.com" data-i18n="footer_contact">联系我们</a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
